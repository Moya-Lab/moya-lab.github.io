<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOYA-LAB</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --panel:#020617;
  --border:#0f172a;
  --text:#e2e8f0;
  --muted:#475569;
  --accent:#22d3ee;
  --green:#34d399;
  --violet:#a78bfa;
}

body{
  margin:0;
  font-family:'JetBrains Mono', monospace;
  background:var(--bg);
  color:var(--text);
  padding:40px 20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.block{
  border:1px solid var(--border);
  padding:18px;
  margin-bottom:18px;
  background:var(--panel);
}

.title{
  color:var(--accent);
  margin-bottom:10px;
}

.dim{color:var(--muted)}
.green{color:var(--green)}
.violet{color:var(--violet)}

.cursor{
  display:inline-block;
  width:8px;
  background:var(--accent);
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

a{
  color:var(--accent);
  text-decoration:none;
}
a:hover{ text-decoration:underline }

canvas{
  border:1px solid var(--border);
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div class="block">
  <div class="title">MOYA-LAB</div>
  <div class="dim">Modelling Omics Yielding Analytics</div>
</div>

<!-- TERMINAL ROTATION -->
<div class="block">
  <div id="terminal"></div>
</div>

<!-- RESEARCH -->
<div class="block">
  <div class="title">Research Feed</div>
  <div id="research"></div>
</div>

<!-- SPOTLIGHT -->
<div class="block">
  <div class="title">Bioinformatics Spotlight</div>
  <div id="spotlight"></div>
</div>

<!-- GAME -->
<div class="block">
  <div class="title">Simulation</div>
  <canvas id="game" width="600" height="300"></canvas>
</div>

</div>

<script>

/* TERMINAL ROTATION */

const TERMS = [
"genomics","transcriptomics","proteomics","metabolomics","epigenomics",
"metagenomics","microbiome","systems_biology","multiomics",
"single_cell_omics","spatial_omics",
"differential_expression","gene_regulation","network_inference",
"biomarker_discovery","dimensionality_reduction","clustering",
"variant_calling","sequence_alignment","genome_assembly",
"functional_annotation","qc_pipeline",
"deep_learning","machine_learning","representation_learning",
"feature_selection","graph_models","bayesian_models",
"pathway_analysis","phylogenetics","evolutionary_models",
"rna_seq_analysis","long_read_sequencing","short_read_sequencing",
"host_microbiome_interaction","microbial_ecology",
"data_integration","computational_modeling"
];

let tIndex=0, char=0, deleting=false;

function loop(){
  const el = document.getElementById("terminal");
  const word = TERMS[tIndex];

  if(!deleting){
    el.innerHTML = "> describe " + word.slice(0,++char) + '<span class="cursor"></span>';
    if(char===word.length){
      deleting=true;
      setTimeout(loop,1500);
      return;
    }
    setTimeout(loop,40);
  }else{
    el.innerHTML = "> describe " + word.slice(0,--char) + '<span class="cursor"></span>';
    if(char===0){
      deleting=false;
      tIndex=(tIndex+1)%TERMS.length;
    }
    setTimeout(loop,20);
  }
}
loop();


/* RESEARCH DATA */

const PAPERS = [
{
title:"Deep learning for microbiome profiling",
journal:"Nature Biotechnology",
year:"2026",
authors:"Smith J., Lee K.",
method:"metagenomics + deep learning",
doi:"https://doi.org/10.1038/example",
insight:"Microbial diversity predicts metabolic pathways"
},
{
title:"Single-cell transcriptomics of immune response",
journal:"Cell",
year:"2025",
authors:"Garcia M., Chen L.",
method:"scRNA-seq",
doi:"https://doi.org/10.1016/example",
insight:"Cell heterogeneity drives immune adaptation"
},
{
title:"Multi-omics integration using graph models",
journal:"Genome Research",
year:"2025",
authors:"Patel R., Kim S.",
method:"graph neural networks",
doi:"https://doi.org/10.1101/example",
insight:"Network structure reveals hidden biology"
}
];

let pIndex=0;

function renderPaper(){
  const p = PAPERS[pIndex];
  document.getElementById("research").innerHTML = `
  > publications --latest

  [${p.year}] ${p.journal}
  ${p.title}

  authors: ${p.authors}
  method: ${p.method}

  link: <a href="${p.doi}" target="_blank">${p.doi}</a>

  [INSIGHT]
  ${p.insight}
  `;
  pIndex=(pIndex+1)%PAPERS.length;
}
renderPaper();
setInterval(renderPaper,6000);


/* SPOTLIGHT */

const FACTS = [
"Metagenomics enables the study of entire microbial communities without culturing.",
"RNA-seq quantifies gene expression across thousands of genes simultaneously.",
"CRISPR-Cas9 allows precise genome editing using guide RNA.",
"AlphaFold predicts protein structure with high accuracy.",
"Microbiome composition influences host metabolism and immunity."
];

let fIndex=0;

function renderFact(){
  document.getElementById("spotlight").innerHTML =
  "> insight\n\n" + FACTS[fIndex];
  fIndex=(fIndex+1)%FACTS.length;
}
renderFact();
setInterval(renderFact,5000);


/* SIMPLE GAME */

const c=document.getElementById("game");
const ctx=c.getContext("2d");

let player={x:50,y:150};
let target={x:500,y:150};

function game(){
  ctx.clearRect(0,0,600,300);

  ctx.fillStyle="#22d3ee";
  ctx.beginPath();
  ctx.arc(player.x,player.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#34d399";
  ctx.beginPath();
  ctx.arc(target.x,target.y,8,0,Math.PI*2);
  ctx.fill();

  if(Math.hypot(player.x-target.x,player.y-target.y)<15){
    target.x=Math.random()*580;
    target.y=Math.random()*280;
  }

  requestAnimationFrame(game);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp")player.y-=5;
  if(e.key==="ArrowDown")player.y+=5;
  if(e.key==="ArrowLeft")player.x-=5;
  if(e.key==="ArrowRight")player.x+=5;
});

game();

</script>
</body>
</html>
